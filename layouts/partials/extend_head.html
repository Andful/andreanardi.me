{{ if or .Params.math .Site.Params.math }}
<link rel="stylesheet" href="{{ .Site.BaseURL }}katex/katex.min.css">
<script defer src="{{ .Site.BaseURL }}katex/katex.min.js"></script>
<script defer src="{{ .Site.BaseURL }}katex/contrib/auto-render.min.js" onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}] });"></script>
{{ end }}
